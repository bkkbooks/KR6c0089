body:
  text: 金剛般若波羅蜜經金性堅剛能破萬物如人有智慧能斷絶貪嗔癡一切諸相梵語般若華言智慧性體昭融善破一切煩惱轉為妙用梵語波羅蜜華言到彼岸衆生作業受苦生死輪回之地謂之此岸諸佛菩薩究竟超脫清淨安樂之地謂之彼岸凡夫即此岸佛道即彼岸一念惡即此岸一念善即彼岸六道如苦海無舟不能渡以般若六度為舟航渡六道之苦海故云到彼岸言人之智慧如金之剛便可脫離業障至佛地位故曰般若波羅蜜經徑也學佛之捷徑即成佛之道路凡人欲到此路當內修般若以至究竟若但能誦説心不依行是身外覓佛向外求經終不悟理見性故佛號為金剛般若波羅蜜經總是要人從凡悟聖永息迷心也法會因由分第一説法聚會由此起因分者分也梁昭明太子以經文浩繁故分為三十二分使人便於講誦也如是我聞阿難自言如是之法我從佛聞明非自説如者衆生之性萬別千差動靜不一無可比類無可等倫是者即是衆生之性離性更無別法法非有無謂之如皆是佛法謂之是聞者聽聞也聽非無聞亦非有聞了無取舍名為真聞故云水不離波波是水鏡水塵風不到時應現無瑕照天地又頌曰猿啼嶺上鶴唳林間斷雲風卷水激長湍最愛晚秋霜午夜一聲新雁覺天寒一時佛在舍衛國祇樹給獨園一時者當日説法之時佛梵語華言覺謂能覺悟自性併覺悟羣生也孔子曰西方有大聖人不治而不亂不言而自信不化而自行正指佛也生於周昭王時號曰釋迦舍衛波斯匿王所居之國祗樹乃匿王太子祇陀所施舍衛國有名須達拏者常施孤獨貧人因稱給孤獨長者曾往護彌長者家求婚其家請佛説法須達拏聞之心開意解欲請佛歸佛令先歸求地惟祇陀太子有園遂往求之太子戲曰爾布金滿園我即與汝須達隨運金布之太子見其意誠却金許地同建精舍請佛説法故名給孤獨園佛在此將以説經與大比邱衆千二百五十人俱梵語比邱比破也邱煩惱也言能破除煩惱華言僧亦名乞士上乞法於諸佛以明己之真性下乞食於世人以為世人種福大比邱乃得道之深者佛欲講真空無相妙理非成材達德之大比邱安能言下頓悟故與之俱處於園中其衆有千二百五十人具見信從之多爾時世尊食時著衣持鉢至次第乞已還至本處爾時言彼時佛為三界之尊舉世恭敬故稱世尊正當喫食之時著柔和忍辱之衣持四天王所獻之鉢乞食於人佛為王太子而乃持鉢乞食欲使後世比邱不植資産不生驕慢之意次第乞者不擇貧富貴賤巡門而乞大慈平等乞畢復歸於園飯食訖收衣鉢洗足已敷座而坐食畢收衣鉢無繫戀也洗足欲清淨也敷座陳設講座也此説法常儀智者禪師頌曰法身本非食應化亦如然為長人天福慈悲作福田收衣息勞慮洗足離塵緣欲證三空理跏趺示入禪善現起請分第二善現須菩提之別名初生時其家盡空相師占之唯善唯吉故又名善吉於大衆中起身請問佛法時長老須菩提在大衆中至而白佛言希有世尊長老年高德尊之稱從座而起將以請佛説法偏袒右肩乃執役服勞之禮懺悔謝過之儀右膝著地右是正道左是邪道此用正道以歸依也合掌心合於道道合於心所以收斂起敬總是整理威儀以伸問詞希有者讚佛為舉世所罕見如來善護念諸菩薩善付囑諸菩薩此一段須菩提請問之詞而首稱佛曰如來如者寂然不動真性之本體來者感而遂通真性之應用心常空寂湛然清淨無所從來亦無所去故稱佛為如來善護念者令諸學人以般若智慧煉自身心不令妄起憎愛沾染六塵墮生死苦海惟其善護念故又善委付囑托諸菩薩教之奉法而行念念精進勿使斷絶須菩提説此二句欲佛説法以教人使人得證佛果菩薩即受如來教法之人為修行者之通稱在講座者甚衆故曰諸菩薩世尊善男子善女人至應云何住云何降伏其心善男子正定心也善女人正慧心也謂能決斷定慧永無退轉也阿無也無諸垢染也耨多羅上也三界無能比也三正也正見也藐遍也一切有情無不遍有三菩提知也知一切有情皆有佛性梵語阿耨多羅三藐三菩提華言無上正等正覺謂真性也得此性者所以為佛超脫三界不復輪回住謂止而不遷降伏謂能制之御之須菩提發問曰若善男子善女人發求正覺之心應當於何所安住一切衆生躁擾不停猶如飄風動搖隙塵念念相續無有間歇若欲修行當以何道降伏其意欲世尊指示用功法則川禪師云這問從甚處出來頌曰你喜我不喜君悲我不悲雁思飛塞北燕憶舊巢歸秋月春花無限意箇中只許自家知佛言善哉善哉須菩提至善付囑諸菩薩佛讚須菩提所説如來二句甚善能知我意善教諸人不起妄念心常精進勿令染著諸法相也汝今諦聽當為汝説至應如是住如是降伏其心諦詳審也若善男子善女人發正覺之心即是當止之地就此而住不可暫離設或妄心萌動當以此為制御之方兩如是言只這裏便是不必他求凡夫之心動而昏聖人之心靜而明凡夫多被境礙心事礙理不知心空境自空理寂事自寂心境兩忘乃是真法忘境猶易忘心最難若不忘心但欲忘境境不能忘反增紛擾故萬法惟心若能見性不生妄念便是降伏其心也龐頌曰世人重珍寶我貴剎那靜金多亂人心靜見真如性唯然世尊願樂欲聞唯然者領諾之詞須菩提聽佛所説而欣然領諾願佛廣説令中下根機皆歡喜聽受盡得開悟也大乘正宗分第三乘載也載度一切衆生乃正大之宗派佛告須菩提諸菩薩摩訶薩應如是降伏其心摩訶大也摩訶薩雖未成佛實高菩薩一頭地菩薩念慮清淨慈悲喜捨種種方便化導衆生摩訶薩雖在塵勞心常清淨能化所化心無所著乃大悟人也人心妄念最易潛滋暗長故佛告須菩提等又單提一句應如是降伏其心言當以此清淨智慧降伏其妄心也下文度衆生而無一毫著相正是降伏心處所有一切衆生之類至若非有想若非無想一切含靈謂之衆生俱有佛性非獨人也卵生禽鳥之類胎生人獸之類濕生從濕而生蚊螢之類化生變化而生蠶蛾之類色是色身想是思慮有色者溺於情識執有之心妄見是非之輩無色者離情絶欲執著空相不修福慧之輩有想者眼見耳聞常起妄念口説佛法心不依行無想者持靜坐禪能除一切妄念猶如木石不習智慧方便非有想非無想者一念寂然不動似非有想而實又虗中能照不是無想有無俱遣語默雙忘無取舍愛憎之心歷數九類正所謂一切衆心也我皆令入無餘涅槃而滅度之我佛自稱也令入使悟入也無餘者功行圓滿清淨自然全無習氣煩惱其中安樂無有餘欠漏隙涅槃圓滿清淨之義楞嚴經云涅槃清淨不生不死之地一切修行者所依歸乃超脫輪回出離生死即如來究竟到彼岸地位滅者滅盡一切習氣度者渡脫生死苦海佛謂一切衆生皆因妄念蔽錮不能作佛我盡使他同歸覺悟造到無餘涅槃處令一切衆生皆受化渡總見佛心平等普願與一切衆生同入圓滿清淨無餘涅槃同渡生死苦海同諸佛所證也如是滅度無量無數無邊衆生實無衆生得滅度者一切衆生皆從業緣中現出或生而為人或生於天上或生為畜類或生於地獄無非自業緣而生是本無此衆生也故佛言我雖如此滅度衆生良由衆生本性原有佛原自能度特不能覺悟而名為衆生即使度盡無限量無數目無邊際如此其多皆不過還其本然而已何可言我度他故曰實無衆生得滅度者六祖壇經云自性自度名為真度淨名經云一切衆生本性常滅不復更滅文殊菩薩問世尊實無衆生得滅度者如何世尊曰性本清淨無生無滅故無衆生得滅度無涅槃可到此皆歸之衆生自性耳華嚴經云若人欲了知三世一切佛應觀法界性一切惟心造造化因心偈曰賦象各由心影嚮無欺詐元無造化工羣生自造化何以故須菩提至衆生相壽者相即非菩薩佛呼須菩提問曰何以故度衆生實無有可度者菩薩若見有度便覺為己私計誇功示能為貪惡業是有我相有我即有人相對分別爾汝較量賢愚為嗔惡業是有人相既見有人未免分別箇種種衆生觸類生情偏向執著為癡惡緣是衆生相因有人見衆生見便不肯平等自求福利思量長生於世為愛惡緣是壽者相有此四者形相則吾心智慧從而昏蔽却與衆生同一迷途便不是菩薩地位中人此所以雖度衆生而實無度也能除四相即名降伏其心妙行無住分第四奧妙之行本無住著復次須菩提菩薩於法至應如是布施不住於相須菩提原從座而起請問故佛命之復位次使之定則生慧也佛言心無四相此心何所住著當如雲行於天水流於地無所絆礙俱胝和尚凡見僧來問話唯豎一指頭佛鑒禪師頌曰不用將心向外求箇中消息有來由報言達磨西來意祇在俱胝一指頭菩薩了悟人法二空心無取捨能知聖凡一體空色一般善惡一等內破一切執著住無所住龍濟和尚頌曰心境頓消融方明色於空欲識本來面青山白雲中是於佛法應當無住非勉強也凡夫不識自佛只向外求住相迷真分別他境不能助道但求福利似箭射空如人入暗菩薩有此無住之念行於布施凡形色聲音馨香滋味與情所感觸法所化導名為六塵皆是我與衆生共具要去布施不見有我為能施人不見有他為受施者不見中間有物可施三體俱無染著是以智慧性照見一切皆空不求果報菩薩但應如是布施而不可住於相修行人有六度而布施第一能除我人衆生壽者四相煩惱妄想取舍憎愛之心清淨行施不生執著是不住相布施也傅頌曰禪河隨浪靜定水逐波清澄清生覺性亡慮滅迷情遍計虗分別由來假立名若了依他起無別有圓成何以故若菩薩不住相布施其福德不可思量菩薩何以不住相布施蓋菩薩若是無住遇緣即施緣散即寂心中清淨利益一切雖不徼福自然離生死苦受大快樂歷千劫而不古超三界以長今其福德自致不可思惟而量度也夫佛貴無相緣何説福得蓋憫衆生被六塵染著未可遽化故以福德無限姑誘之須菩提於意云何至亦復如是不可思量於意云何佛將欲問之而教他心中酌量何如不也世尊須菩提謂其言不然佛舉東南西北四維上下十方言宇宙莫大於虗空不可思量菩薩無住相布施所得福德遍滿虗空亦如十方廣大不可得而思量也川禪師云可知禮也頌曰虗空境界豈思量大道清幽理更長但得五湖風月在春風依舊百花香須菩提菩薩但應如所教住佛呼須菩提言此心所應止處但當如上所説不住相之教安住其心要知不住相即是降伏若能降伏心便止而不遷故曰應住三昧經云如來所説法悉從於無住我從無住處是處禮如來經中言語雖多總是説真空無相妙理以化度衆生必衆生能安住降伏不生我人衆生壽者四相才可到涅槃地位説布施者不過使修行者易於入門原不甚重一經大義已盡於此下文不過反覆辨明無相之意恐人一著有相便不能安住降伏也如理實見分第五真如之理乃真實見解須菩提於意云何至所説身相即非身相上言安住降伏能成佛果恐人疑實有佛身可見不知吾心中自有如來故問須菩提可以身相見如來不須菩提已解佛意曰不也色身有相從地水風火假合成形法身無相乃般若真性有何形體相貌色身是凡夫法身是如來凡夫但見色身不見法身故不可以身相得見如來其故謂何如來説法時現此身相原是幻形非真實身相也豈得以此見如來凡夫謂色身是有執著修行不見佛性生死轉重如來法身無相本無生滅猶若虗空於何有迹故言所説身相即非身相寶積如來頌曰凡相滅時性不滅真如覺體離塵埃了悟斷常根果別此名佛眼見如來川禪師云且道只今行立坐臥是什麼相休瞌睡頌曰身在海中休覓水曰行山嶺莫尋山鶯啼燕語皆相似莫問前三與後三佛告須菩提凡所有相至若見諸相非相即見如來佛言不特如來無身相可得即世間凡一切涉於相者皆是虗而不實妄而不真色身是相中有真實之體故云皆是虗妄法身非相却是真如本體備乎其中人若能識破此諸相非真實相是見色身中有法身自性中有如來而如來豈可外求回光返照得見身相無形可得是能具智慧性即為見如來矣傅頌曰如來舉身相為順世間情恐人生斷見權且立虗名假言三十二八十也虗聲有身非覺體無相乃真形川禪師云山是山水是水佛在甚麼處頌曰有相有求俱是妄無形無見墮偏枯堂堂密密何曾間一道寒光爍太虗正信希有分第六生真正信向心此人最為希有須菩提白佛言至得聞如是言説章句生實信不須菩提前言如來無相恐衆生不親見佛身徒聞此章句所説佛法未必能真實信向故有此問佛告須菩提莫作是説至能生信心以此為實佛恐阻衆生修進之心故答曰須菩提莫作是説雖如來沒後至後五百歲最遠之時亦必有持守佛戒修行善事的人能於此經中聞得一章一句信心油然而生把此經信得鑿鑿皆是真實語者不因時遠遂無人也傅頌曰因深果亦深理密奧難尋當來末法世惟恐法將沉空生情未達聞義恐難任如能信此法定是覺人心川禪師云金佛不度爐木佛不度火泥佛不度水頌曰三佛儀形總不真眼中童子面前人若能信得家中寶啼鳥山花一樣春當知是人不於一佛二佛至乃至一念生淨信者種諸善根謂一於諸佛所諸菩薩所一切尊長之處恭敬供養承順教命一於貧苦衆生起慈愍心隨力惠施一於對諸惡類自行柔和忍辱令彼發歡喜心一於六道衆生不行欺毀不加殺害信心者謂信般若波羅蜜能除一切煩惱能成就一切出世功德能出生一切諸佛信自身佛性本來清淨無有染污與諸佛性平等無二信六道衆生本來無相信一切衆生盡得成佛可見心為衆善之根本是人若非清淨其心何能遽信佛之所説當知他不止在一二諸佛善人及四五諸佛善人處培植善根必已曾於無限量諸佛善人處培植衆多善根故才聞是經便覺心耳相契從一念清淨不染中真實聽信蓋有發生而不可遏者在五百歲後尚且必有是人況近代乎須菩提如來悉知悉見是諸衆生得如是無量福德悉皆也是人能生淨信心心便與如來相合進之可以為如來矣雖是世遠一切衆生當得如是無可量度的大福德豈能逃如來所知所見言理之必然也川禪師頌曰一佛二佛千萬佛各各眼橫兼鼻直昔年曾種善根來今日依前得善力須菩提須菩提著衣吃飯尋常事何須特地却生疑何以故是諸衆生無復我相至無法相亦無非法相衆生何以得無量福皆因生淨信心時無復有我人衆生壽者四相故於佛法初不泥紙上陳言不著一法相亦不離佛氏宗旨不著一非法相心生則一切法生心滅則一切法滅心既清淨諸法俱空故無聖賢等見一切善惡諸法相諸相盡空如此故得福如虗空廣大不可思議也何以故是諸衆生若心取相至法尚應捨何況非法衆生何以諸相皆無也心本虗圓活潑不可少有執著佛與衆生惟此一心無形無相不生不滅當下便是動念即乖猶如虗空無有邊際若執取一形相是著相外求求之轉失不離我人衆生壽者四相此取法相而偏於有法取非法相而偏於無法所取雖不同俱是著於我人衆生壽者四相此無智慧者如何得成佛道人心不可取相如此是故不當執取有法亦不當執取無法以是不當取之故佛常常與汝等説當知我所説之法譬如渡水之船筏然人未濟度須用以渡之既登彼岸即棄之而不用喻人未了悟真性不可無佛法既了悟真性即不須佛法也夫佛法尚當捨之而不用何況非佛法者此其所以不當取也不然焉能悉無諸相而得福德也哉慈受禪師云順天門外古招提爛熳春光照錦溪物物更無心外法箇中能有幾人知川禪師頌曰得樹攀枝未是奇懸崕撒手丈夫兒水寒夜冷魚難覓留得空船載月歸無得無説分第七法體空寂本無所得亦無所説須菩提於意云何至如來有所説法耶不應取非法人所易知若併不應取法何以漸進佛果故佛以有所得有所説法而設疑以詰之須菩提言如我解佛所説至亦無有定法如來可説有定者執一而無變通也須菩提曰若我解悟世尊所説之義豈是世尊真謂佛有所得有所説法耶心本無得亦不言不得但為衆生所見不同如來因彼根性種種方便開誘化導指示一切衆生使其離諸執著凡妄心生滅不停逐境界前念瞥起後念隨覺覺既不住見亦不存可見法原在心中惟具智慧性者自能變而通之原無有定法可名為無上正等正覺亦原無定法使如來可得而説法華經云諸根利鈍精進懈怠隨其所堪而為説法是故法無定相迷悟懸殊若未悟時似無所得若悟了時似有所得得與不得皆是妄見但不可執著自契中道豈有定法可説耶川禪師云寒即言寒熱即言熱頌曰雲起南山雨北山驢名馬字幾千般請看浩渺無情水幾處隨方幾處圓何以故如來所説法皆不可取不可説非法非非法法之所以無有定者何也如來所説之法都是了悟真空妙理可以性修而不可以色相取可以心傳而不可以口舌説凡人執著如來所説文字章句不悟無相之理妄生知解故言不可取如來為化種種衆生應機隨量所有言説亦何有定學人不解如來深意但誦所説衆法不了本心終不成佛故言不可説説為無法而法未嘗無説為有法而法未嘗有極是處圓不滯不可説他非法非非法法原無一定可執況可得而處之乎傅頌曰菩提離佛説從來無得人須依二空理當證法王身有心俱是妄無執乃名真若悟非非法逍遙出六塵川禪師云是什麼頌曰恁麼也不得不恁麼也不得廓落太虗空鳥飛無影迹咄撥轉機輪却倒回南北東西任往來所以者何一切賢聖皆以無為法而有差別無為者以正覺還我真性本來無假作為即是無住無住即是無相蕩然空寂鑒覺無礙乃真是解脫佛法須菩提又言所以知如來所説不可取者何也觀彼一切賢人若菩薩等聖人若如來諸佛等莫不皆用此無為之法而得證果但悟深者則為佛悟未深者即為菩薩其間微有差等分別而無為却同所以如來未嘗取一法以為説也川禪師頌曰正人説邪法邪法悉歸正邪人説正法正法悉歸邪江北成枳江南橘春來都放一般花依法出生分第八諸佛所依之法皆從此經生出須菩提於意云何至是人所得福德寧為多不前言法不可取又恐人不受持經典故以布施獲福較之三千大千總形容世界之多七寶金銀琉璃珊瑚瑪瑙珍珠玻璃七寶滿世界已是無限況曰大千世界又曰三千大千世界如是七寶之多用以布施此人所得福德多耶不多耶蓋布施供養身外之福受持經典性內之福身福是衣食性福是智慧凡人雖有衣食性中愚迷是前生布施供養不持經典者亦有聰明智慧而貧無衣食是前生持經聽法不布施供養者可知內外雙修方為全德須菩提言甚多世尊至是故如來説福德多七寶布施是住相布施希求福利獲福雖多而於明心見性了無所得惟依般若波羅蜜多修行令自性不墮諸有是名福德性故人本來性體中原無一物何嘗有此福德今以施寶之故而遂得此福德是故如來説福德多傅頌曰寶滿三千界齎持作福田惟成有漏業終不離人天川禪師頌曰寶滿三千及大千福緣終不離人天若知福德原無性買得春花不用錢若復有人於此經中至為他人説其福勝彼聽聞此經不可徒以言受須念念不違其教方為受而持之受者當下承受持者時刻不忘受之不忘於心持之不厭其久曉明經義依教而行如船入海無所不通是名受持四句偈不必指那四句上有乃至二字下有等字特舉以該括全部經耳古今論四句偈者不一或指聲香味觸法或指經中二偈或云若見諸相非相即見如來或云眼耳鼻舌或云有為無為非有為非無為句或云有諦無諦真諦俗諦各執己見初無定論惟天親菩薩請益彌勒如何是四句偈彌勒云無我相人相衆生相壽者相六祖大師復以摩訶般若波羅蜜多是若果執此兩轉語便為倒根何異數他人珍寶於自己無半文分幸而傅大士云若論四句偈應當不離身可見四句偈不假外求總在心地了悟也上既説明布施者必得福佛遂引人受持此經悟明真理乃至四句偈等拳拳持守而不失又能為他人講説經偈之義所獲之福較七寶布施之福尤勝何以故須菩提一切諸佛至所謂佛法者即非佛法何以知其得福尤勝觀彼一切諸佛及諸佛所證無上正覺之法莫不皆由悟此金剛般若而成正覺是知此經之義方且出生一切諸佛豈僅得布施之福而已哉蓋諸佛惟此一心何法不從心所立猶如大地何物不生故從此經出者非謂言説章句乃指般若心性一切衆生愚迷顛倒不知覺悟種種修行多向身外無有是處菩薩於諸佛法都無染著見如不見聞如不聞心境空寂自然清淨故般若之法雖名佛法本來無有佛亦不過假此以開悟衆生非實有佛法也人若誤認受持二字謂實有佛法則著相而不明性何以福德之勝於布施乎川禪師云且道此經從甚處出須彌頂上大海波中頌曰佛祖垂慈實有權言言不離此經宣此經出處還相委便向雲中駕鐵船又云能將蜜果子換汝苦葫蘆頌曰佛法非法能縱能奪有收有放有生有殺眉間常放白毫光癡人猶待問菩薩一相無相分第九此言四果似乎有一相然本自無形何有得果之相須菩提於意云何須陀洹至是名須陀洹須陀洹梵語華言入流與下斯陀含阿那含阿羅漢俱從聲聞而悟道者上言佛法無相恐人遂疑佛果難成故舉四無心得果者發之須陀洹知身是妄欲入無為之理斷除人我執著之相以無取心契無得理無取則心空無得則理寂雖能捨粗重煩惱未能離微細煩惱此人不入地獄不作修羅餓鬼異類之身謂學人悟初果也夫煩惱者菩提之根本若人照了練習可為出世之法譬如高原陸地不生蓮花蓮花生於淤泥濁水中愈見煩惱不損菩提如日月翳於煙雲中而日月原無損珠玉落乎泥滓中而珠玉亦無損故云莫管煩惱障但存菩提心佛恐諸菩薩不知以無念為念尚萌所得之念故設此問呼須菩提曰須陀洹之果謂能作此念而得之不須菩提曰不也凡人報緣未謝於人間世上有許多交涉應須隨緣處之令中虗外順雖在閙市沸湯中亦恬然安穩若有纖毫見戀即便打不過所謂須陀洹者雖居塵囂世界厭喧求靜六塵無染初入其門得預聖人之流然特名為入流而實無心得此入流之果者也但因其遇有色聲香味觸法等事了不相入故虗名為須陀洹耳多尊者頌曰萬行周通能覺性驅除煩惱更勤修七生七死方成道初等陀洹入聖流須菩提於意云何斯陀含至是名斯陀含梵語斯陀含華言一往來是第二果視入流又高一級漸修精進之業操持更密念念不住六塵境界然終未盡能清淨但前念才著後念即覺猶有此一番生滅念故言一往來然色身雖有來去而法身湛然不動心既無我誰云往來特名為一往來而實無心得此一往來之果者也是虗名之為斯陀含耳傅頌曰捨凡初入聖煩惱漸輕微斷除人我執創始證無為緣塵及身見今者乃知非一返人天後趨寂不知歸須菩提於意云何阿那含至是故名阿那含梵語阿那含華言不來是第三果修持又密于二果人六塵竟不來侵了悟人法俱空漸修精進已斷欲界思惑直生兜率天宮更不來生欲界是為得不來果故名為不來然心空無我又何為不來所以名為不來而實無心得此不來之果者也惟其實無不來是故虗名為阿那含耳川禪師云諸行無常一切皆苦頌曰三位聲聞已出塵往來求靜有疏親明明四果元無果幻化空身即法身須菩提於意云何阿羅漢至即為著我人衆生壽者梵語阿羅漢華言無生諸漏已盡無復煩惱已悟不生不滅之理是第四果比三果又進一級佛言修行者至於阿羅漢道將得矣亦自謂能作此念而得之不須菩提曰不也所謂阿羅漢者已悟無生之理無煩惱可斷無貪嗔可離情無逆順心境俱空故雖得道而心實未曾執一樣法特虗名為阿羅漢耳若作我已得阿羅漢道之念即著我人等相與阿羅漢地位相隔何以稱是名哉四果人俱説他無心可見聖賢皆以無為法全不住相但四果只是了一身不度衆生佛門謂之小乘世尊佛説我得無諍三昧至我是離欲阿羅漢塵念欲起我念欲遣彼此各不相下謂之諍心無生滅去來惟有本覺常照謂之無諍此就是脫離人欲故云離欲阿羅漢三昧梵語華言正定亦云正受謂入定之法正而定中所受境界非是妄想須菩提曰我説四果人無心得果非是我摹擬之見但據我自身看來佛嘗稱我得無諍之道渾然若太虗無著不徒是三昧中人乃三昧中人最為第一是第一離欲阿羅漢然佛雖如此稱我我實不作得是離欲阿羅漢之念也川禪師云把定則雲橫谷口放行則月落寒潭頌曰喚馬何曾馬呼牛未必牛兩頭都放下中道一時休六門迸出遼天鶻獨步乾坤總不收世尊我若作是念至名須菩提是樂阿蘭那行阿蘭那華言無諍須菩提言我若作是思念而得此道即為不離欲即是有諍心佛則不於諸弟子中獨稱説善現是好樂無諍之行者惟我終日修行實無心得此無諍之行故世尊加我名曰須菩提是樂阿蘭那行者所以説我為第一我無心而得果如此則四果之人無心得果不益信乎傅頌曰無生即無滅無我復無人永除煩惱障長辭後有身境忘心亦滅無復起貪嗔無悲空有智翛然獨任真川禪師云認著依前還不是頌曰蚌腹隱明珠石中藏碧玉有麝自然香何必當風立活計看來恰似無應用頭頭皆具足莊嚴淨土分第十齋莊嚴飾是清淨心地佛告須菩提於意云何至於法實無所得然燈佛即定光佛生時身光如燈後至成佛故名然燈是釋迦佛受記之師上雖言無心得佛果畢竟得字不曾去終著一分相故佛問曰我昔日於本師處聽法於法有所得不須菩提曰不也世尊如來在然燈佛所於法雖因師開示良由自性本來清淨本無塵勞寂然常照覺悟成佛實非於師處聽聞而得之也若有所得寧免有心之纍傅頌曰昔時稱善慧今日號能仁看緣緣是妄識體體非真法性非因果如理不從因謂得然燈記寧知是舊身須菩提於意云何至即非莊嚴是名莊嚴佛土即菩提心莊嚴者心常清淨不向外求任運隨緣一無所得行住坐臥與道相應無妄念皆清淨之謂我既無所得是外不染六塵內無私欲邪心之纍則菩薩修行時節是何可以有心求莊嚴故問須菩提曰為菩薩者果成莊嚴佛土不須菩提曰不也性如太虗原無所謂莊嚴今以黃金為地七寶為林皆外飾之事非莊嚴也至于真性中自有六度萬行布施戒定慧等一切善法皆是莊嚴只不可使有妄念夾雜是虗名為莊嚴耳豈可有心以求之乎傅頌曰掃除心意地名為淨土因無論福與智先且離貪嗔莊嚴絶能所無我亦無人斷除俱不染頴脫出囂塵川禪師云娘生袴子青州布衫頌曰抖擻渾身白勝霜蘆花雪月轉爭光幸有九臯翹足勢更添朱頂又何妨是故須菩提諸菩薩摩訶薩至應無所住而生其心佛言心不可知有莊嚴佛土是故汝等諸修行人當知此心常自空寂無諸妄念不生不滅不動不搖如此清淨凡修六度萬行者應如是生清淨心不當有所執著而生其心若住著色聲香味觸法六塵上而生其心非清淨也凡夫無明起滅妄想顛倒取捨聖凡善惡等見是名濁亂心因境來觸遂生其心如猿猴捉月病眼見花一切萬法皆從心生心有所住即是妄念六塵競起譬如浮雲往來不定若悟真空即無所住即是智慧無諸煩惱可見諸菩薩欲得阿耨多羅三藐三菩提者豈應如是生住著於六塵的心惟應於無所住著處生心則此心生生而不容己一真如無染之心也豈不清淨既曰清淨何等莊嚴譬如天平盤中無物其心自正説一生字便見佛法雖重無相何嘗教人稿木死灰川禪師云雖然恁麼爭奈目前何頌曰見色非干色聞聲不是聲色聲不礙處親到法王城又云退後退後看看頑石動也頌曰山堂靜夜坐無言寂寂寥寥本自然何時西風動林野一聲寒雁唳長天須菩提譬如有人至佛説非身名大身此譬喻心之大也人心能生萬變萬化既從此出故以須彌山王喻之須彌山高廣三百三十六萬里日月繞山而行以為晝夜由此而分四面為四天下其上有三十三天可謂至大為衆山之王人身豈有如是之大者佛説人心充滿六虗遊於清淨誠足以塞天地貫古今是託名之為大身非實説有大身也人不求之清淨而求有得求莊嚴得母反小視其心乎川禪師云設有向甚處著頌曰擬把須彌作幻軀饒君膽大更心粗目前指出千般有我道其中一也無便從這裏入傅頌曰須彌高且大將喻法王身七寶齊圍繞六度次相鄰四色成山相慈悲作佛因有形終不大無相乃為真無為福勝分第十一持經度人無假作為其福最勝須菩提如恆河中所有沙數至尚多無數何況其沙西土有河名曰恆河周圍四十里與佛説法處相近故佛取之為喻恆河中沙極細而多將一粒沙比一河則有無量恆河再將無量恆河中所有沙總而算之則多多無盡矣故須菩提曰諸恆河尚且極多無可算數何況其中之沙乎川禪師云前三三後三三頌曰一二三四數恆沙沙等恆河數更多算盡目前無一法方能靜處薩婆訶須菩提我今實言告汝至而此福德勝前福德實言者言非虗謬欲人信也以諸河中之沙一粒沙算一三千大千世界極形容世界之甚多也受持四句偈等雖不比施七寶之多實智慧心生於我矣又能為他人解説則人人俱得證佛果成無上道故所獲福報尤勝于布施可見人必當持經為人解説或有云布施為六度之首此言福德不如持經者何也蓋七寶布施雖無吝惜畢竟有七寶方遂心若無七寶便不能布施然要知七寶雖多不過人間有限之物布施以此但受人間有限之福財施有盡法施無窮財施不出欲界法施能超三界若於此經中受其義理而持守之則己不為惡業所縛可以悟明真性又為他人解説使人亦得聞此至理共明真性久而善根皆熟可以脫離輪回永超生死是持經度人窮亦可達亦可日日可行處處可行無窮無盡福德豈不溥哉智者禪師頌曰恆河數甚多沙數更難量舉沙齊七寶能持智慧漿有相皆為幻徒言智慧強若論四句偈此福未為長川禪師云真鍮不換金頌曰入海算沙徒費力區區未免走塵埃爭如運出家中寶枯木生花別樣春尊重正教分第十二佛教正大受持者天人皆生敬重復次須菩提隨説是經至皆應供養如佛塔廟須菩提歷歷與佛辨析不敢安坐受教故佛又命之復位次而告之曰為人解説不必有揀擇隨所在之處見人即便演説此經心無分別雖至四句偈等甚少當知此説經之處即是如來説法之地令諸聽者生清淨心無諸妄念悟得本來佛性即此幻身便是法身中有如來全身舍利感得天上之神世間之人八部鬼神中之惡類阿修羅等皆當以華香瓔珞幢幡繒蓋香油蘇燈恭敬供養如藏佛遺體舍利之塔設立殊特佛像之廟傅頌曰恆沙為比量分為六種多持經取四句七寶詎能過法門遊歷處供養感修羅經中稱最勝尊高似佛陀何況有人盡能受持讀誦至即為有佛若尊重弟子止於此地講説經中四句偈尚能有感動何況有人盡能持誦全經者乎應知此人所成就之法乃最上第一希有之法也寧不愈感天人等恭敬耶經典感通之妙如此則知經在之處即如佛在其處即是佛與弟子菩薩等俱在其處人若見經即自見佛安得不持誦講説凡人自心誦得此經自心解得經義自心體得無相無著之理所在之處常修佛行念念無有間歇心常清淨不生不滅無諸妄念便可立地成佛可見即心是佛故言所在之處即為有佛尊重弟子謂菩薩等能悟無相妙理有可尊重也川禪師云合如是頌曰似海之深如山之固左旋右轉不去不住出窟金毛獅子兒全威哮吼衆狐疑深思不動干戈處直攝天魔外道歸杲禪師頌曰即心是佛無餘法迷者多于心外求一念廓然歸本際還如洗腳上船頭僧問首山如何是佛山答新婦騎驢阿家牽鼓山圭禪師為作頌云阿家新婦兩同條咫尺家鄉路不遙可笑騎驢覔驢者一生錯認馬鞍橋如法受持分第十三依佛所説之法承受而持守之爾時須菩提白佛言世尊至是名般若波羅蜜須菩提見如來讚美經典因請此經當屬何名使我等奉事此經而持守之佛曰明此經者其智慧如金之剛利能斷絶一切有相之物除一切邪妄之念直至諸佛菩薩之彼岸名為金剛般若波羅蜜以是名字汝當奉而持之只在自心行住坐臥勿令分別便能斷一切疑執然法性即空不可執此為相悟明本性湛若太虗體尚且無何名之有如來恐人生斷滅見不得已而強安是名故虗名為般若波羅蜜以接引衆生隨説隨掃惟恐人住于相也歸宗禪師云有座主來參值宗鋤草見一蛇斬之主云久向歸宗元來是箇粗行沙門宗云是爾粗我粗且道這僧過在什麼處昭禪師為作頌曰廬嶽宗師接上機斬蛇特地施慈悲癡迷座主生驚怖却道粗心惹是非須菩提於意云何至白佛言世尊如來無所説本心原淨諸法原空更有何法可説二乘之人執著人法是有即有所説菩薩了悟人法皆空却無所説佛蓋強名為金剛經未嘗實指經中曰此是何等法安得為真有般若波羅蜜之法寒山子云吾心似秋月碧潭光皎潔無物堪比倫教我如何説川禪師云低聲低聲頌曰入草求人不奈何利刀斷了手摩挲雖然出入無蹤迹文彩全彰見也麼須菩提於意云何三千大千至非世界是名世界怎見得法無可説今三千大千世界以無量因緣乃成一切衆生豈外此而別有世界悟者處此迷者亦處此悟者之心清淨心也以此心處此世界即清淨世界迷者之心塵垢心也以此心處此世界即微塵世界世界許多而微塵亦不勝其多使一切衆生皆生清淨心非微塵所可污故云非微塵得出世間法非世界所能間故云非世界在世離世在塵離塵可見實非有微塵之定形也不過虗名為微塵如來説世界亦非實有世界之定形也一切山崖會有崩裂一切江河會有枯竭不過虗名為世界云耳若必説佛有法是微塵實有微塵世界實有世界只此一念便不清淨何以究竟作佛故古德云一念不生全體見六根才動被雲遮傅頌曰積塵成世界析界作微塵界喻人天果塵為有漏因塵因因不實界果果非真果因知是幻逍遙自在人圜悟禪師上堂云十方同聚會箇箇學無為此是選佛場心空及第歸大丈夫具決烈志氣慷慨英靈踏破化城歸家穩坐外不見一切境界內不見有自己上不見有諸聖下不見有凡愚淨裸裸赤灑灑一念不生桶底子脫豈不是心空到這裏還容棒喝麼還用元妙理性麼還容彼我是非麼直不如紅爐上一點雪相似豈不是選佛場然雖如是猶涉階梯在且問涉階梯句作麼生道千聖會中無影迹萬人叢裏奪高標須菩提於意云何可以三十二相至是名三十二相三十二相者謂眼耳鼻舌身五根中具修六波羅蜜謂布施持戒忍辱精進禪定智慧是也于意根中修無住無為是三十二相清淨行即心成佛原不在相好莊嚴上若據如來妙相本性湛然空寂一相尚不可得豈可以三十二相而求見欲見如來即我有覺悟心是也故如來三十二相雖若異於衆生然亦與衆生幻形同歸有盡非是真實相也但名為三十二相耳川禪師云借婆衫子拜婆年頌曰你有我亦有君無我亦無有無俱不立相對嘴盧都須菩提若有善男子善女人至為他人説其福甚多世人所重者莫過於身命若知身是幻相即以身命布施不認為己有固較之施七寶者不同然畢竟不明本性如生豪貴之家驕奢縱恣難免造業反受業報縱使捨身如沙數之多爭如受持四句偈等而解説之使人我同登彼岸其福豈不甚多夫捨身尚不如持經度人人何可不以持經為急務傅頌曰施命如沙數人天業轉深既掩菩提相能障涅槃心猿猴探水月莨𦿆拾花針愛河浮更沒苦海出還沉又頌曰經中稱四句應當不離身愚人看似夢智者見唯真法性無前後無中非故新蘊空無實相憑何見有人川禪師云兩彩一賽頌曰伏手滑槌不換劍善使之人皆總便不用安排本現成箇中須是英靈漢囉囉哩囉哩囉山花笑野鳥歌此時如得意隨處薩婆訶離相寂滅分第十四脫離一切形相則真心寂靜妄念消滅爾時須菩提聞説是經至未曾得聞如是之經須菩提是阿羅漢於五百弟子中解空第一大徹悟真空無相義趣傷共覺悟之晚不覺涕淚悲泣曰希有世尊佛説如是甚深經典我從昔來雖有得於慧眼實未曾得聞是經蓋具慧眼但知得萬法皆空今併其空亦遣之所以感極而涕零也傅頌曰聞經深解義心中喜且悲昔除煩惱障今能離所知遍計于先了圓成證此時宿乘無閡慧方便勸人持川禪師云好笑當面諱了頌曰自小生來慣遠方幾回衡嶽度瀟湘一朝踏著家鄉路始覺途中日月長世尊若復有人得聞是經至成就第一希有功德須菩提言我得慧眼者今日才聞此經世之衆生豈有聞而遂信者如人聞此經信于心使心中常是清淨則萬法當前自然了徹真實之相即從此無相中生發出來譬如鑑空即能照也當知是人決定成就諸佛功德莫有過之者豈非第一希有變福言功者功成果滿福不足道也傅頌曰未有無心境曾無無境心境亡心自滅心滅境無侵經中稱實相語妙理能深證知惟有佛小聖詎能任佛説無相但去妄念不去天理若併天理去了未免行尸走肉虗生世間故説出生實相三字亦慮人之流于枯稿也世儒不去細究反言佛氏虗無寂滅豈不罪過世尊是實相者即非相是故如來説名實相雖曰實相其實無相但就無相中能生照心比之頑空者不同故言為非不是竟言無如龜毛兔角只説龜無毛兔無角不説無龜毛兔角只説實相無相不説無實相達磨曰若解實相即見非相正猶水中鹽味色裏膠青決定是有不見其形是故如來虗名之為實相傅頌曰衆生與壽者蘊上立虗名如龜毛不實似兔角無形川禪師云山河大地甚處得來頌曰遠觀山有色近聽水無聲春去花猶在人來鳥不驚頭頭皆顯露物物體元平如何言不會只為太分明世尊我今得聞如是經典至一切諸相即名諸佛須菩提言我今得聞如是經典幸有如來現在得之於耳提面命故信其言解其義信受而持守之何難之有獨以世尊滅度後歷五百歲之久去聖人遼遠衆生之中若能信解受持心常清淨不著諸相悟住無所住心了得無所得法此是第一流人可謂絶無而僅有何故而獨能信解受持此經其人必無我人等四相所以能悟般若波羅蜜甚深經典信解受持也又須知是人所以能持是經而無四相者何也彼能知四相本來不生即非四相義也何以知四相非相也所造之地有智慧心能離一切諸相解悟三空契合實相究竟涅槃三世如來同證此理即稱諸佛矣傅頌曰空生聞妙理如蓬值在麻凡流信此法同火出蓮花恐人生斷見大聖預開遮如能離諸相定入法王家川禪師云若不得後語前話也難圓頌曰難難難如平地上青天易易易似和衣一覺睡行船盡在把梢人誰道波濤從地起又云行住坐臥著衣吃飯更有什麼事頌曰冰不熱火不寒土不濕水不乾金剛腳踏地幡竿頭指天若人信得及北斗面南看又云心不負人面無慚色頌曰舊竹生新筍新花長舊枝雨催行路客風送片帆歸竹密不妨流水過山高豈礙白雲飛佛告須菩提如是如是至當知是人甚為希有須菩提所解空義契合如來之旨故深然之不驚無駭愕心不怖無懼怯心不畏無阻難心佛恐世遠僅存言教人或有此三心則信解受持未必堅固故稱是人甚為希有傅頌曰如能發心者應當了二邊涅槃無有相菩提離此緣無乘及乘者人法兩俱捐欲達真如理應當識本源川禪師云祇是自家的頌曰毛吞巨海水芥子納須彌碧漢一輪滿清光六合輝踏得故鄉田地穩更無南北與東西何以故須菩提如來説第一至是名第一波羅蜜何以言其希有是經為萬法之綱三世諸佛皆從此成為第一彼岸波羅蜜有十種一布施二持戒三忍辱四精進五禪定六智慧七慈八悲九方便十不退今言第一波羅蜜以布施資生衆善直至菩提登彼岸豈真有哉特立是名以證持經有益耳傅頌曰波羅稱彼岸於中十種名高卑緣妄識次第為迷情焰裏尋求水空中覓響聲真如何得失今始號圓成川禪師云八字打開兩手分付頌曰是名第一波羅蜜萬別千差從此出鬼面神頭對面來從此莫道不相識須菩提忍辱波羅蜜至是名忍辱波羅蜜不但持經可登彼岸修行人亂真性者莫如辱能忍耐不起嗔心則亦可登彼岸然忍僅是藏蓄之意工夫一懈終不能忍又不如與忍俱忘蓋真性中原無辱可忍不過虗名以勸人太陽禪師舉火問僧云會麼僧云不會師云起則遍周沙界滅則了無所得龐居士問馬祖云不與萬法為侶是什麼人祖云回光自照看待你一口吸盡西江水然後向你道何以故須菩提如我昔為至無衆生相無壽者相梵語歌利王指無道極惡君佛昔修道山中有諸宮女從王出獵因王倦寢諸宮女見佛以為仙也遂環集佛所禮拜王覺大怒將刀割截佛之身體天怒雨石乃免何以見無心忍辱佛言我遭此凌辱之時惟無我人等四相故忘其辱亦忘其為忍辱縱被割截無所顧慮若使我於往昔被歌利王欲將我身𣩊裂時有一毫我人等相則嗔恨之心必有不容遏者亦何能忍辱如此不但於歌利王如此猶思憶過去五百世時知此身原是假合因單修忍辱之道作忍辱仙人我已脫離四相久矣所以忍辱而不住忍辱之相傳頌曰暴虐唯無道時稱歌利王逢君出遊獵仙人橫被傷頻經五百世前後極時長承仙忍辱力今乃證真常川禪師云智不責愚頌曰加刀斷水似火吹光明來暗去那事無妨歌利王歌利王誰知遠煙浪別有好商量又云目前無法從教柳緑花紅耳畔無聲一任鶯啼燕語頌曰四大元無我五蘊悉皆空廓落虗無理乾坤萬古同妙峯嶷嶷常如故誰管顛號刮地風肇法師曰五蘊身非有四大本來空將頭臨白刃一似斬春風歌者即慧之別名利者刀也非謂世間之刀王者心也是用慧刀割截無明煩惱之身體也應生嗔恨者謂色身與法身不同當知割截之時即不見有身相亦不見有我人等四相何處更有嗔恨也圜悟禪師云大凡為善知識應當慈悲柔和善順接物以平等無諍自處彼以惡聲色來加我非理相干訕謗毀辱但退步自照勿與較量亦不嗔恨久之魔孽自消若與之較即惡聲相反豈有了期且見性之人聞人毀謗如飲甘露心自清涼不生煩惱則能成就定慧之力不被六賊盜竊家寶功德法財遂從此增長今人或被言語小嫌或為錢財得失往往毀情爭鬬搆訟經年骨月而成讐敵覩此寧不猛省是故須菩提菩薩應離一切至若心有住即為非住口非住住字作止字看餘皆言染著也佛言據我忍辱不住相看來今諸菩薩欲求無上道果發無上道心者又豈可少住相當離一切相以發正覺心然後可以成佛不可住於聲色香味觸法而生心也蓋真心中初無色聲等故六祖云我於此法無住為本華嚴云一切境界不生染著淨身口意住無礙行滅一切障世間受生皆由著我若離此著則無生處涅槃經云凡夫著色乃至著識以著識故則生貪染心故為所縛乃至為識之所繫縛以繫縛故則不得免生老病死憂悲大苦一切煩惱於此能生無所住著之心便是居塵出塵才合於阿耨多羅三藐三菩提法不然心便不能脫灑即非菩薩之所當止色聲等人人皆有但一沉溺於中却生出許多煩惱貪吝心便不能全智慧得證佛果佛所以屢屢戒之察禪師心印頌曰問君心印作何顏心印何人敢授傳歷劫坦然無異色呼為心印早虗言須知體似虗空性意似紅爐火裏蓮莫謂無心云是道無心猶隔一重關川禪師云是即此用離此用頌曰得之於心應之於手雪月風花天長地久朝朝雞向五更啼春來處處山花秀圜悟禪師云在家菩薩修出家行如火中生蓮蓋名位權勢意氣卒難調伏而況火宅煩擾熬煎百端千緒除非自己直下明悟本性妙圓到大寂大定休歇之場方能放下廓爾平常徹證無心觀一切法如夢幻泡空豁豁地隨時應節消遣將去隨自己力量轉化未悟同入無為無事法性海中則出來南閻浮提打一遭必不為折本也是故佛説菩薩心至利益一切衆生故應如是布施六塵中一箇色字最易染著色即是空空即是色識得他破無過於佛故又獨摘出言之惟不應住六塵而生心念是故菩薩的心謂六度以布施為首亦不應住於色而行布施何也祇為一切衆生不可令彼贏此絀須均被其澤始有以利益之應當如此不住色布施也其餘聲香味觸法之不應住又可推己故華嚴經云不為自身求歡樂但為救護諸衆生傅頌曰菩薩懷深智何時不帶悲投身憂虎餓割肉恐鷹飢精勤三大劫曾無一念疲如能同此行皆得作天師川禪師云有佛處不得住無佛處急走過三十年後莫言不道頌曰朝遊南嶽暮往天台追之不及忽然自來獨坐獨坐無拘繫得寬懷處且寬懷如來説一切諸相至又説一切衆生即非衆生若説是諸相原有相無怪乎人之有住也如來所説諸相以凡有相者終有敗壞皆是虗妄人身中原自有真常不滅之相並不見有真實形迹故云即是非相但人迷即衆生悟即是佛若能斷諸妄念見自佛性即非衆生非原有衆生之定名也川禪師云別有長處不妨拈出頌曰不是衆生不是相春暖黃鶯啼柳上説盡山雲海月情依前不會空惆悵空惆悵萬里無雲天一樣須菩提如來是真語者至不誑語者不異語者真語無一毫偽實語無一毫虗如語契真如之語不誑語不誑惑人不異語不作怪誕語蓋如來一言一語皆從清淨心中流出故言此五者令人生信心毋疑心傅頌曰衆生與蘊界名別體非殊了知心似幻迷情見有餘真言言不妄實語語非虗始終無變異性相本來如川禪師云知恩者少負恩者多頌曰兩箇五百是一貫阿爺原是丈夫漢分明對面報渠言爭奈好心無好報真語者實語者呵呵呵喏喏喏須菩提如來所得法此法無實無虗欲言其實無形可觀無相可得欲言其虗時時呈露處處周圓此真空無相之妙法也然如來法無所得何故説一得字蓋如來所得之法正是此無實無虗心法不可以言得也所以人不可著相求傅頌曰證空便為實執我乃成虗非空亦非有誰有復誰無對病應施藥無病藥還袪須依二空理頴脫入無餘川禪師云水中鹽味色裏膠青頌曰硬似鐵軟如酥看時有覓時無雖然步步常相守要且無人識得渠咦須菩提若菩薩心住於法至日光明照見種種色佛言設若修行人求證佛果其心於法尚有所執住縱然能行布施亦未能了徹真空故如人入暗室中茫無所見若心一無住著則隨布施隨渾忘此心圓融何微弗徹譬如人本有眼目加以日光有不照見種種形色者乎須菩提當來之世至皆得成就無量無邊功德將來之世後五百歲濁惡之時如來雖沒若有人知本心無相能于此經受持讀誦心常精進則不著相處慧性漸開應當了悟人法二空不被一切善惡聖凡諸境惑亂即與如來智慧同矣任他無量無邊功德是人皆能當下頓悟若以佛之智慧照之無不悉知悉見共能成就豈以五百歲後遂難其人真為第一希有耶川禪師云因地而倒因地而起向你道甚麼頌曰世間萬事不如常又不驚人又久長如常恰似秋風至無意涼人人自涼持經功德分第十五受持此經功德無量須菩提若有善男子善女人至受持讀誦為人解説佛恐人執著如來忍辱之説徒以身布施而于自己性與他人性無纖毫利益故于十三分言之至此復言屢救其失初日分謂早辰中日分謂中午後日分謂晚間一日三時以恆河沙等身命布施如是捨身直至歷無量劫世間原無此事佛不過慮未來衆生以布施求福反染煩惱之因故設化假喻極言布施之多且遠也終不若金剛經有聞之者一心信向無所違逆只此一念聞經悟道我人頓盡言下即佛將捨身有漏之福比持經無漏之慧實不可及故其福德勝彼捨身者何況更能書寫此經受持之讀誦之且為人解説流傳今古自種善根又啓人之善心日見增長愈久而愈盛此為出世間福其得福也不尤多乎川禪師云人天福報即不無佛法未夢見在頌曰初中後發施心同功德無邊算不窮爭似信心心不逆一拳打透太虗空須菩提以要言之至不可稱量無邊功德信心于此經得福非私造之説也今舉經中要領言之所説原要人生智慧心不可住相非他經之溺于口耳文字者比不可以心思口議不可以稱算量度功德之大無有邊際亦復如此所以一生信心遂能獲福如來為發大乘者説為發最上乘者説乘車也阿羅漢獨了生死不度衆生謂之小乘如車乘之小者能自載而已緣覺之人半為人半為己謂之中乘如車乘之適中者也菩薩智慧廣大善能建立一切法普度衆生故為大乘佛又能化度菩薩不見垢法可厭不見淨法可求不見衆生可度不見涅槃可證不作度衆生心亦不作不度衆生心在大乘之上不復有乘故為最上乘佛言人固當信經然是經非根器淺薄者可得聞當日如來于無可説中而幻為之説者為欲度衆生為菩薩使之空諸色相啓發有大乘心者説也為欲度菩薩為佛使之得空空相念啓發有最上乘心者説也人若是與法兩相合然後才生信心川禪師云如斬一握絲一斬一切斷頌曰一拳打倒化城關一腳躍翻元妙寨南北東西信步行休覔大悲觀自在大乘説最上説一棒一條痕一掌一握血長沙云百丈竿頭不動人雖然得入未為真百丈竿頭須進步十方世界現全身若有人能受持讀誦至阿耨多羅三藐三菩提今受持讀誦能自覺矣廣為人説能覺人矣令其深悟不生毀謗大得忍力大智慧力大方便力使諸學者自悟無相之理得見本性如來成無上道便與如來相印合豈不悉知悉見是人決定可以成就無盡藏的功德背負曰荷在肩曰擔言此等人欲使己與衆生皆了悟此經開發心中智慧光明離諸塵勞妄念皆成就佛道把如來無上覺悟事都以一身負任之豈非荷擔如來阿耨多羅三藐三菩提耶川禪師云擘開大華手須是巨靈神頌曰堆山積嶽來一一盡塵埃眼裏瞳人碧胸中氣若雷出邊沙塞靜入國貫英才一片寸心如海大波清幾見去還來心佛頌曰佛即心兮心即佛心佛從來皆妄物若知無佛復無心始是真如法身佛佛佛佛沒模樣一顆圓光含萬象無體之體即真體無相之相即實相非色非空非不空不動不靜不來往無異無同無有無難取難捨難指望內外圓明到處通一佛國在一沙中一粒沙含大千界一箇身心萬箇同知之須會無心法不染不淨為淨業善惡千端無有無便是南無大迦葉何以故須菩提至聽受讀誦為人解説所以稱其荷擔如來無上正覺者何也其人真能有大乘最上乘之心也設使是人所樂者是小乘教法必愚鈍之量局于見聞之小不能聽信廣大無上菩提只修福慧六道輪回因果之法縱能強學執著多聞不免有我人等見之私即不能聽受讀誦為人解説此經之義豈能得正法如荷擔乎勇禪師云顏色規模恰似真人前拈弄越光新及乎人火重烹試到了歸終是假銀川禪師云仁者見之謂之仁智者見之謂之智頌曰不學英雄不讀書波波役役走長途娘生寶藏無心用甘作無知餓死夫爭怪得別人須菩提在在處處至以諸華香而散其處在在處處所在之處不一自身持誦復為人解説隨其所在之處皆有此經如摩尼寶珠瑞光輝煥足以感天地動鬼神一切世間凡在天道人道阿修羅道者所應供養當知此有經之處即是如來境界宛然如真身舍利寶塔在前無不生恭敬心圍繞作禮以歸依將諸花香列其處無所不用其恭敬若非受持真經必不可得傅頌曰所作依他性修成功德林終無趨寂意唯有濟羣心行悲悲廣大用智智能深利他兼自利小聖詎能任川禪師云鎮州蘿蔔雲門糊餅頌曰與君同步又同鄉起坐相從歲月長渴飲飢餐常對面不須回首更思量能淨業障分第十六心能清淨凡諸罪業皆消不足為障復次須菩提若善男子至得阿耨多羅三藐三菩提先世指前生亦可就現在論如昔日作惡今日向善在世上改換一番亦為先世佛言持此真經應為天人恭敬今或有疾患貧窮反為人輕賤憎惡便謂讀經無益福報為虗語遂生疑惑有退轉心殊不知非經無功德蓋是人先世曾作無量罪業應墮惡道不得令終今藉此持經之力不過遭人輕賤先世罪業悉皆冰消火滅不復墮落惡道豈止僅僅滅罪而已將來必得佛果菩提誰謂持經不大有益耶張無盡云四序炎涼去復還聖凡只在剎那間前人罪業今人賤倒却前人罪業山傅頌曰先身有報障今日受持經暫被人輕賤轉重復還輕若了依他起能除遍計情常依般若觀何慮不圓成川禪師云不因一事不長一智頌曰讚不及毀不及若了一萬事畢無欠無餘若太虗為君題作波羅密人往往為邪淫悖逆事若論天理應該自身受譴兒孫受殃嘗見有此等人一旦追悔前非歸依經教學做好人雖先前罪過不免人之指觸輕賤今已實心向善不復為惡干犯刑憲貽害後代自新者如此獲福況未嘗作惡者又能持經豈不更得福慶須菩提我念過去無量至算數譬喻所不能及梵語阿僧祇華言無數那由他華言一萬萬佛言我思念過去無量無數的世界遭其劫難皆因經教不明故我于然燈佛前授記時得遇萬萬不可勝算諸佛悉皆供養承事無一佛使虗過者惟慮無以闡明佛法而垂之經也然我身猶幸遇諸佛是法盛時節猶可易及至于後末世將復受劫之時教法凌夷僅存一線于此得持經之人悟無生理息希望心遠離衆生顛倒知見即到波羅彼岸永出三塗證無餘涅槃真是砥柱中流衍佛教于不斷者也凡人終日供養只求福田不求出離生死苦海自性若迷福何可救以此人較量功德我雖有供佛功德百分百千萬億分尚不及其一分也即使強為算數強為譬喻彼却功德甚大安能及之川禪師云功不浪施頌曰億千供佛福無邊爭似常將古教看白紙上邊書黑字請君開眼目前觀風寂寂水漣漣謝家人祇在漁船須菩提若善男子善女人至果報亦不可思議具詳也末世衆生德薄垢重嫉妒彌深衆聖潛隱邪見熾盛故上文只概言功德之大引人精進若還詳説其大又恐愚人聞之心生狂亂狐疑不信反阻向道之心所以但使人知功德之大而不詳言要之是經所説原都是説無相其義趣原不可心思口議人依此經修行所得功德之果報亦豈可容思議哉果者如花成實報者如響應聲理之必然也川禪師云各各眉毛眼上橫頌曰良藥多苦忠言逆耳冷暖自知如魚飲水何須他日待龍華今朝先受菩提記
