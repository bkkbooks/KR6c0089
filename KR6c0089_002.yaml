body:
  text: 究竟無我分第十七究竟佛法本無我體爾時須菩提白佛言世尊至無有一衆生實滅度者上説修行人不可思議須菩提遂轉憶初問安住降伏未免猶著思議故再問之佛言菩提之心人人皆有等為物欲所蔽時生妄想貪嗔取舍一切不善心人欲還其本有當生這箇菩提心猶如虗空無染無雜大日輪照四天下日升之時明遍天下虗空不曾明日沒之時暗遍天下虗空不曾暗明暗之境自相凌奪虗空之性廓然不變自然發生不礙真性與安住降伏著實用功者不同一切衆生原無不善心因貪財色恩愛情重方有此心性頑鈍者總在夢中有利根者一撥即轉故我應度一切衆生不過以無我心將忍辱以降伏令邪惡不生不起能度之一念亦不見所度之衆生故我即度脫衆生成佛已盡而實無有一衆生是我滅度者也川禪師云有時因月好不覺過滄洲頌曰若問云何住非中及有無頭無纖草蓋足不履閻浮細似鱗虗柝輕如蝶舞初衆生滅盡知無滅此是隨流大丈夫何以故須菩提至阿耨多羅三藐三菩提心者滅度衆生已了不見是我滅度者無四相也蓋人有四相即見有衆生可度仍有能度衆生心謂涅槃可證可求反是煩惱根本菩薩心常空寂淡然虗靜本無四相所以無四相者何也萬法皆從心生究其實真性中蕩蕩空空一法不立一塵不染何曾有法以發此菩提心是故人能自然發生其心者即當化度而非菩薩之實能度也傳頌曰空生重請問無心為自身欲發菩提者當了現前因行悲疑似妄用智最言真度生權立我證理即無人川禪師云少他一分又爭得頌曰獨坐翛然一室空更無南北與西東雖然不借陽和力爭奈桃花一樣紅須菩提於意云何至如來得阿耨多羅三藐三菩提佛言不但衆生實無法名菩提心汝試云我於師處有法得之名為無上正等正覺不須菩提深解無相之理謂若有般若了悟心在即是有法尚有所得之心故言不也其言契合于佛心故佛稱如是如是深然之也川禪師云若不同牀睡怎知紙被穿頌曰打鼓弄琵琶相逢兩會家君行楊柳岸我宿渡頭沙江上晚來初雨過數峰滄翠接天霞須菩提若有法如來得至如來者即諸法如義授記者命之了悟真性以成佛也來世猶言後日梵語釋迦華言能仁謂心性無邊能含容廣度一切也牟尼華言寂默謂心體清淨動靜不干也佛言若于法有所得是為執相即有心在便同凡夫然燈焉得與我授記惟其無得心上無纖毫停留自性清淨故方授記于來世得成佛也其故謂何以如來之所以得名者即能了諸法空相得如如之義一切諸法本來清淨由取捨分別所以濁亂不得自如心若清淨自然如中天杲日歷歷分明于諸法上都無取舍分別真性遍虗空世界如常自如故謂之如既空諸法自然有感即通故謂之來非性中原有法也但于六塵中不生分別而本體湛然不染不著曾無變異如空不動圓通瑩徹歷劫長存是名諸法如義使謂實有所得才可成佛何以稱名為如來慈受禪師云一顆靈丹大似拳服來平地便升仙塵緣若有絲毫在蹉過蓬萊路八千龍牙和尚云深念門前樹能為淡泊棲來者無心喚去者不慕歸若人心似樹與道不相違傅云人與法相待二相本來如法空人是妄人空法亦祛人法兩無實受記可非虗一切皆如幻誰言得有無又云法性非因果如理不從因謂得然燈記寧知是舊身川禪師云貧似范丹氣如項羽頌曰上無片瓦下無立錐日往月來不如是誰噫又云住住動著則三十棒頌曰上是天兮下是地男是男兮女是女牧童撞著看牛兒大家齊唱囉囉哩是何曲調萬年歡若有人言如來得阿耨多羅至於是中無實無虗凡言得者皆自外來真性豈外來之物若有人言佛得無上正等正覺之真性是為妄語當知佛所得菩提果原是本來真性正覺之法本非性中所有何處可執著萬行悉備恆沙德用何處不發現故無實無虗人惟當心悟此法何可言有所得哉川禪師云當嫌千口少貧怨一身多頌曰生涯如夢若浮雲活計都無絶六親留得一雙清白眼笑看無限往來人是故如來説一切法至是故名一切法法惟無所得是故如來説世間一切諸法將謂為實向甚處摸索若以為虗何處不分明但能色相俱空不著不染從此脫離皆可稱為佛法然性體本空所謂一切法者其實非有一切法也人不得不假此以修行故虗名之為一切法耳川禪師云明明百草頭明明祖師意頌曰會造逡巡酒能開頃刻花琴彈碧玉調爐煉白丹砂幾多伎倆從何得須信風流出當家又云上大人邱乙己頌曰是法非法不是法死水藏龍活鱍鱍是心非心不是心逼塞虗空古到今祇者是絶追尋無限野雲風捲盡一輪孤月照天心馬祖云一切衆生從無量劫來不出法性三昧長在法性中著衣吃飯言談祇對六根運用一切施為盡是法性不解返源所以隨名逐相迷情妄起造種種業若能一念回光返照全體聖心何處不是佛法須菩提譬如人身長大至即為非大身是名大身佛言譬如人之一身雖長且大意謂人若心不菩提此身空自長大以顯一切衆生法身不二無有限量須菩提與佛一心嘗聞佛説此語故不待譬喻完即答云如來説人身長大是法身無相廣大無邊若色身有相內無智慧即為非大身故非真實有大身但虗名之耳知大身之非身則知一切法者誰是一切法豈可謂其實有所得又豈可謂實能滅度衆生耶川禪師云喚作一物即不中頌曰天産英靈六尺軀能文能武善經書一朝識破娘生面方信間名滿五湖須菩提菩薩亦如是至無我無人無衆生無壽者豈惟佛哉即菩薩亦不可知有滅度菩薩到處皆行方便不可以有心為之夫色身長大爭奈有生滅有限量即非大身二乘之人有煩惱妄想不能除滅即同凡夫滅色取空不了色性即非菩薩若造作此言我當化度衆生未免有心不知色性自空非色滅空如病眼人見空中花無有是處何以名為菩薩其故謂何蓋心迷即衆生心悟即成佛一切空寂本來不生不見有生死不見有涅槃不見有善惡不見有聖凡不見一切法正見之時了無可見故滅度而實無有滅度之法所以得名為菩薩惟其實無有法是故佛於無可説中説一切法皆是真空無相絶無有我人衆生壽者四相夫法本無相安得以滅度為己功乎傳云名因共業變萬象即微生若悟真空色翛然獨有名川禪師云喚牛即牛呼馬即馬頌曰借婆衫子拜婆門禮數周旋已十分竹影掃階塵不動月輪穿海水無痕須菩提若菩薩作是言至即非莊嚴是名莊嚴自認滅度心不清淨可知設有有心要求清淨説我當莊嚴佛土即便著相不可稱為菩薩何也佛土者自心淨土也本來清淨無相可以莊嚴惟有妙莊嚴之理存乎其中故所説莊嚴佛土者非實有莊嚴也但虗名而已豈有菩薩而猶著於相耶須菩提若菩薩通達無我法者如來説名真是菩薩知有我即非菩薩究竟何以名菩薩必把我一身看得十分透徹知身非我有法非我得人與法雙忘才是真正名為菩薩楞伽經云二無我謂人無我法無我人無我者謂人無本體因業而生法無我者謂法無本體因事而立若作富貴之業則生于富貴中作貧賤之業則生于貧賤中是人無本體也如因欲渡水則為舟楫之法因欲陸行則為車輿之法是法無本體也一切法因事而立皆為假合假合即是虗妄若信此理而悟解之是真菩薩菩薩不可執一我相況如來菩提之心誰謂有法以發之川禪師云寒即普天寒熱即普天熱頌曰有我原無我寒時燒軟火無心似有心半夜拾金針無心無我分明道不知道者是何人呵呵一體同觀分等十八萬法歸一更無異觀須菩提於意云何至如是世尊如來有佛眼前説無我是説無妄心非并説無覺性也故言佛有覺性而先舉清淨五眼問之化身觀見于世間開化衆生見色身起滅內外空寂謂之肉眼見自真性是法平等普照大千謂之天眼見自性中般若智燭常明照徹衆生性靈深淺謂之慧眼見諸色相心不動搖了諸法空遍充三界謂之法眼見前際無煩惱可斷中際無自性可守後際無佛可求三際清淨本性常覺破諸空妄謂之佛眼凡夫與如來同具此五眼但為物欲所蔽不能常明如來真空無我性體湛然清淨自無纖毫障翳傅頌云天眼通非閡肉眼閡非通法眼唯觀俗慧眼直緣空佛眼如千日照異體還同圓明法界內無處不含容川禪師云盡在眉毛下頌曰如來有五眼張三祇一雙一般分皂白的的別青黃其間些子爻訛處六月炎天下雪霜須菩提於意云何至若干種心如來悉知有一世界必有一佛設化故曰佛世界佛以恆河之沙喻世界之廣更舉無窮之沙喻衆生種種妄念若干種心如來悉知者眼耳鼻舌身意凡起心動念處即是國土于國土中所有衆生若干種種差別之心心數雖多總名妄心既覺是妄故云悉知如來惟具足五眼是覺性常具足矣故能無不悉知其心川禪師云曾為浪子偏憐客慣愛貪杯識醉人頌曰眼觀東南意在西北將謂猴白更謂猴黑一切衆生一切心盡逐無窮聲與色喝何以故如來説諸心皆為非心至未來心不可得諸心即若干種心吾心本一何得有若干種心如來所以能悉知者何也以諸心總是妄心但因其從心而起不得不名之為心原非真實之心也所以識其非心者何也此心太空毫無所纍説不得他有過去現在未來心所以説若干種心皆是非心而如來無不知之也要知三心只一心本來無有因事而起事過即滅如言語時是現在未出口謂之未來一出口即為過去又如人思食之時則欲食之心為未來得食之時則欲食之心為現在食畢放箸則欲食之心為過去不甚相遠傅頌曰依他一念起俱為妄所行便分六十二九百亂縱橫過去滅無滅當來生不生常能作此觀真妄坦然平圓悟禪師頌曰欲識平常道天真任自然行船宜舉棹走馬即加鞭若遇飢來飯還應困即眠盡從緣所得所得亦非緣川禪師云病多諳藥性頌曰一波才動萬波隨似蟻循環豈了期咄今日與君都割斷出身方號丈夫兒又云低聲低聲直得鼻孔裏出氣頌曰三際求心心不見兩眼依前對兩眼不須遺劍刻舟尋雪月風花常見面法界通化分第十九佛法充滿世界無不通達感化須菩提於意云何若有人滿至如來説得福德多總是説心無相以是因緣得福者以布施的緣故得福是有漏有礙之寶非清淨無為功德蓋福田心造佛言若心中果實有此福德則福德非外來何以言得惟是本無一物本無此福德藏在心中故如來不止言得而更言多若有菩薩以盧舍那身中七寶菩提持齋禮讚從其心燈化生功德不生不滅堅如金剛乘香花雲入無邊界起光明臺供十方一切諸佛此無為功德見性之施化為菩薩頌曰廣將七寶持為施如來不説福德多若用心燈充供養威光遍照滿婆娑離色離相分第二十色相皆妄離之即見性須菩提於意云何至是名具足色身色身者皮肉形軀也具足者無少欠缺也佛恐衆生不悟佛心無相即心可以成佛但見此具足色身便為如來故復問之不知此乃是幻身究竟還歸烏有佛全不在此故云即非具足色身明禪師云養就家欄水牯牛自歸自去有來由如今穩坐深雲裏秦不管兮漢不收川禪師云官不容針私通車馬頌曰請君仰面看虗空廓落無邊不見蹤若解轉身些子力頭頭物物總相逢僧問趙州狗子有佛性麼州云無進云蠢動含靈皆有佛性為什麼狗子無佛性州云為他有業識在夫有業識之人種種著于有起諸妄想者名顛倒知見種種著于空都無所悟者名斷滅知見宿有善根之人無此二病洞曉空趣此名真正知見若悟此理乃可隨時著衣吃飯長養聖胎任運過時更有何事須菩提於意云何至是名諸相具足具足色身佛猶與人同三十二相獨如來有之若執此求如來祇見化身不知如來離色離相以淨行則具足三十二以智慧則具足八萬四千其實覺性猶虗空故再辨之傳頌曰八十隨形好相分三十二應物萬般形理中非一異人法兩俱遣色心齊一棄所以證菩提實由諸相離四祖謂牛頭融禪師云百千妙門同歸方寸恆沙功德總在心源一切定門一切慧門一切行門悉皆具足神通妙用只在你心業障煩惱本來空寂一切果報性相平等大道虗曠絶思絶慮如是之法無欠無餘與佛無殊更無別法但只令心自在莫懷妄想亦莫歡欣莫起貪嗔莫生憂慮蕩蕩無礙任意縱橫不作諸善不作諸惡行住坐臥觸目遇緣皆是佛之妙用非説所説分第二十一法無可説所説者非性之真須菩提汝勿謂如來是念至不能解我所説故如來不在身相人猶易曉然佛法是如來所説恐人復執此以求如來故曰汝勿以如來曾作此説法念也何也非法無以談空非人無以説法此謂不同生滅之心故有法可説如來雖説法未嘗執取一樣法若以有生滅心而為説法是教一切人不能得見自性即為謗毀如來不能解悟我所説如來無相之義我故曰莫作是念川禪師云是即是大藏小藏從甚處得來頌曰有説皆為謗無言亦不容為君通一線日出嶺東紅須菩提説法者無法可説是名説法本來無法特為衆生去除外妄不得已而説法然不過隨感隨應實無有一定法可説但虗名為説法而已若衆生既悟并法亦無可用安得謂如來實有所説法耶傅云相寂名亦遣心融境亦亡去來終莫見語默永無妨智入圓成理身同法性常證真還了俗不廢是津梁川禪師云兔角杖龜毛拂頌曰多年石馬放毫光鐵牛哮吼入長江虗空一喝無蹤迹不覺潛身北斗藏且道是説法不是説法顏丙曰終日吃飯不曾咬著一粒米終日著衣不曾挂著一莖絲所以我佛橫説豎説四十九年未嘗道著一字唯同道方知若言如來有所説即為謗佛不能解會我所説直饒説得天花亂墜也落在第二著若能坐斷十方打成一片非言語可到是名真説法也所以道地壁瓦礫説禪浩浩前輩頌曰也大奇也大奇無情説法不思議若將耳聽終難會眼處聞聲方得知爾時慧命須菩提白佛言至説非衆生是名衆生言慧命者以須菩提具智慧性故稱之即如稱長老一般無法可説後世衆生便難信解故須菩提問生信心不佛言人無定品皆具真一之性與佛同源詎可以衆生目之因彼背真逐妄自昧其靈又不可以不是衆生目之豈謂生信心者後世遂無其人何也衆生之為衆生特因未悟而名之耳若悟了亦即是佛如來何嘗説他是真實衆生不過虗名之而已智者禪師頌曰不言無所説所説妙難窮有説皆為謗至道處其中多言無所解默爾得三空智覺剎那頃無生無始終川禪師云火熱風動水濕地堅頌曰指鹿豈能成駿馬言烏誰謂是翔鸞雖然不許纖毫異馬字驢名幾百般無法可得分第二十二真性全空故無法可得須菩提白佛言世尊至是名阿耨多羅三藐三菩提須菩提既明無法可説遂悟佛所得菩提之道內覺身心空外覺境緣空破諸色相勿令執著無有秋毫之障微塵之染故以為無所得佛言如是如是者深許其言之當也無有法加一少字絲毫亦不有也言我於此理亦無少法可得菩提亦是虗名草堂清和尚云擊石乃出火火光終不然碧潭深萬丈直下見青天川禪師云求人不如求己頌曰滴水生冰信有之緑楊芳草色依依春花秋月無窮事不妨間聽鷓鴣啼祺禪師云念念釋迦出世步步彌勒下生分別現文殊之心運用動普賢之行門門而皆出甘露味味而盡是醍醐不出旃檀之林長處華藏之境若如此也行住坐臥觸目遇緣雖應用千差且湛然清淨淨心行善分第二十三以清淨心行諸善法復次須菩提是法平等無有高下至三藐三菩提法即是菩提心佛與衆生皆具此性無增無減均平相等無有高下然實無形也特強名為無上正等正覺黃蘗禪師云若觀佛作清淨光明解脫之相觀衆生作垢濁暗昧生死之相作此解者歷恆河沙劫終不能得阿耨菩提又云心若平等不分高下即與衆生諸佛世界山河有相無相遍十方界一切平等無彼我相此本源清淨心常自圓滿光明遍照也傅頌曰水陸同真際飛行體一如法中何彼此理上豈親疏自他分別遣高下執情除了斯平等性咸共入無餘以無我無人無衆生無壽者至即非善法是名善法所以名為無上正等正覺者以真性中本無我人衆生壽者四相乃從妄緣中現而真性則平等不可使他或得或失若以無四相之心修行一切無我真空的善法於一切事無染無著於一切境不動不搖於一切法無取無捨於一切時常行方便隨順衆生令皆歡喜而為説法令悟菩提真性勿使虧欠則覺性便不失墜未有不得也然所謂善法者本來無此善法但假此名直教一切善惡凡聖無取捨愛憎之心平常無事故云即非善法以開悟衆生本不是住於相川禪師云山高水深日生月落頌曰僧是僧兮俗是俗喜則笑兮悲則哭若能於此善參禪六六從來三十六又云面上夾竹桃花肚裏侵天荊棘頌曰是惡非惡從善非善將逐符行兵隨印轉有時獨上妙高峯却來端坐閻王殿見盡人間祇點頭大悲手眼多方便福智無比分第二十四持經者福智最多無可比並須菩提若三千大千世界中至算數譬喻所不能及上言性中無善法恐人以經文為空言不知受持故此又較量施寶福德以大千世界中所有須彌山王上至忉利天下至崑崙際若有將七寶如此之高持用布施其獲福雖百千萬億分僅為住相布施終無解脫之時總不如受持讀誦此經乃至四句偈等所得無住相淨妙功德之一可見佛若不設經救一切衆生無由入悟憑何修行得到佛地傅頌曰施寶如沙數惟成有漏因不如無我觀了妄乃名真欲證無生忍要假離貪嗔人法知無我逍遙出六塵川禪師云千錐劄地不如鈍鍬一捺頌曰麒麟鸞鳳不成羣尺璧寸珠那入市逐風之馬不並馳倚天長劍比乾坤不覆載劫火不能壞凜凜威光混太虗天上人間總不如噫化無所化分第二十五雖化度衆生心無化度須菩提於意云何至如來即有我人衆生壽者如來設立經教雖曰以度衆生為事然未嘗有度衆生之心故誡云汝等勿謂也衆生具無盡煩惱妄想於一切善惡凡聖等見取捨分別迷情蓋覆菩提之性業障深重佛一出世教令覺悟降六賊斷三毒除人我令能回光返照即見自性更不停留纖毫凝滯聞經徹悟自然歸於化度不過還其本有智慧心而已實無有衆生如來度者若言衆生是如來化度則如來便有我人等四相之私矣傅頌曰夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止纖毫不相離如身影相似欲識佛去處只這語聲是川禪師云春蘭秋菊各自馨香頌曰生下東西七步行人人鼻直兩眉橫哆唎悲喜皆相似那時誰更問尊堂還記在麼園悟禪師云赤肉團上人人古佛家風毗盧頂門處處祖師巴鼻若也恁麼返照凝然一段光明非色非心非內非外行棒也打他不著行喝也驚他不得直得淨裸裸赤灑灑是箇無生法忍不退轉輪截斷兩頭歸家穩坐正當恁麼時不須他處覔祇此是西方須菩提如來説有我者至即非凡夫是名凡夫如來既無我人等相何又云我須知假名稱我對所度衆生隨世説我而自性中當體空寂原不著有我相惟凡夫妄認之以為有我其實三世諸佛皆無所有惟有自心既明因果無差乃知心外無法非有我也就是所稱為凡夫者欲離生死而求涅槃欲捨煩惱而求滅度執著一邊不了中道究竟皆不著可成佛豈真有實凡夫哉但虗名耳凡夫自能成雖謂之自度可也如來曾何功耶智者禪師頌曰生修因果果熟自然圓法船自然度何必要似捕魚者得魚忘却筌若道如來度從來度禪師云前念衆生後念佛佛與衆生是何物頌曰見三頭六臂却能拈匙放筯有時酒醉罵人忽爾香作禮手把破沙盆身披羅錦綺做模打樣驀鼻牽來祇是你嗄法身非相分第二十六清淨法身非屬相貌須菩提於意云何至不應以三十二相觀如來身相不可觀如來須菩提前已言過不也何故此處言如是如是亦謂此相為如來所獨具也不知觀如來者但當契清淨本來心若以三十二相觀如來則執相之見猶未除故言轉輪聖王亦有三十二泥形相彼將亦是如來矣豈若是乎轉輪聖王是為四天王管察世間善惡正五九月照南閻浮提二六十月照西瞿耶尼三七十一月照北單越四八十二月照東弗婆提常如輪之轉故名轉輪聖王云臨池喚影終無益觀鏡攀花未是奇實相相忘心滅却依誰川禪師曰錯頌曰泥塑木雕兼綵畫堆青抹緑更裝金若將此是如來相笑殺南無觀世音又云有相身中無相身金香爐下鐵崑崙頭頭盡是吾家物何必靈山問世尊如王秉劍爾時世尊而説偈言至是人行邪道不能見如來我謂佛性也乃真性之佛無形無相不可以形色見亦不可以音聲求世尊因見須菩提疑信相半故於爾時説偈言曰如來只在自心法體清淨猶若虗空無有染礙不落一切塵境視之不見言其有色相不可聽之不聞言其有音聲不可若欲以此二者求見我是不見正覺常住之真佛性不能返觀內照即性而修此等人舍正路而不由不能見如來於方聞蓋因其不反求本心也川禪師云直饒不聲求亦未見如來在且道如何得見不審不審見色聞聲世本常一重雪上一重霜君今要見面走入摩耶腹內藏噫此三十年後無斷無滅分第二十七性體具足不生斷滅須菩提汝若作是念至得阿耨多羅三藐三菩提此二節説具足相論清淨法身不可以相貌取其詞而語須菩提曰此性如來與衆生皆有本無少欠故名具足相不可以色見聲求然溺於無相又恐淪於空寂蓋性含萬法應用遍知去來自由無所罣礙原非一味空寂惟以此具足之性有正覺故得證菩提果若作是念謂如來不以具足性得菩提果未免入於稿情滅念何以為如來故又正其詞而謂之曰莫作是念智者禪師頌曰相相非有相具足相無憑法法生妙法空空體不同斷滅不斷滅知覺悟深宗若無人我念方知是至公須菩提汝若作是念至於法不説斷滅相此二節佛恐衆生執於無法沉迷空寂其詞而語須菩提曰作有相觀即若作無相觀亦是一邊見人豈可泥於相但説盡當斷絶消滅此便非清淨心何可作是念其何蓋既悟之後法亦歸空未悟之前必當依修行於法不可有斷滅相譬如渡水渡後固楫未渡之前非舟楫何由以濟故又正其辭而語之也川禪師云翦不齊兮理還亂拽起頭來割不斷頌曰不知誰解巧安排揑聚依然又放開莫謂如來成斷滅一聲還續一聲來不受不貪分第二十八不受福德無所貪著須菩提若菩薩以滿恆河沙等至是故説不受福德通達一切法無能所心是名為忍説箇忍字制之意初住菩薩如此後來得成無我地位却兩空不必強制故曰無我成於忍佛修行之法未免有我施彼之相若不生無我得成於忍所得福德更勝於前菩七寶布施等福所能比何也不受福德故受蓋受則有貪戀之意如眼對色謂之見之聞見聞是根聲色是塵凡夫被妄心所覆轉即有生滅故塵起即心起塵滅即心滅不知所生滅心皆是妄念菩薩了悟真性活潑潑地洞然同於太虗色聲未對之時我性常見常聞未曾暫滅色聲相對之時我性未嘗暫生所作福德不為自己受享世間福利全為利益一切衆生積福已故不應有所貪戀住著也以此其不受豈同於布施著相者有為相三生却被吞七寶多行諸有欲旋豈愛情恩苦無貪相應到師云耳聽如聾口説如啞頌曰馬下人因高有下有疏親一朝馬死人歸去親者如只是舊時人改却舊時行履處又云裙無腰曰似水如雲一夢身不外更他物分付黃梅路上人道歌天福猶如仰箭射虗空勢力盡箭還墜招得如意蓋言人天福報便是三生業緣少有得受福力不明其本愈冀添以此世福臨命終時福盡業在列惡道受種種來生不如意也威儀寂靜分第二十九四歲動於相須菩提若有人言至亦無所去故名如來釋來去坐臥本文分明不釋虗作同字看所處所也無所從無所去猶言無處所去詳確惟一合理相分第三十須菩提若善男子善女人至但凡夫之人貪著其事知見不生分第三十一須菩提若人言佛説我見至即非法相是名法相應化非真分第三十二須菩提若有人以滿無量至皆大歡喜信受奉行金剛般若一經乃捨法證性之妙道無住生心之極功義理深微未易明了雖有諸家注釋各是其是使後之學者無所適從心都子曰亡羊由於路歧失道由於多方有以哉休幼時聞諸長老云惟如是經義一書所解直捷痛快三根普被堪為斯世津梁於是遍搜諸方五十年未獲今秋道山師得殘本於普陀惜字簍中携來雲林休間假之暫閲見其文理洞徹玄微般若於是乎顯真末世金錍也蓋般若靈光頭頭披露衆生埋沒已久此解能開發道眼故龍天珍惜祕藏不肯磨滅特默授與飢窘之士如是妙法如是慧燈若不刊刻流通則湮沒竟無傳矣恨歲久册頁剝落後缺三分遂至拱璧不完茲板而出之如天下大道場及各庵院有珍藏如是經義者請加刻其三分以補足之庶香飯醍醐同霑法味化城稚子共悟無生功德果報又豈心思口議所可髣佛比量也哉祈懺弟子昉休謹啓
